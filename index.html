
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dico–python</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       OPTIONS
  ========================== -->

  <div class="options">

    <label id="whole-word_only">
      <input type="checkbox" id="whole-word-only" />
      Mots entiers uniquement
    </label>

    <label id="respecter">
      <input type="checkbox" id="respect-accents" />
      respecter accents et diacritique
    </label>

  </div>

  <!-- =========================
       LAYOUT PRINCIPAL
  ========================== -->

  <div class="layout">

    <!-- =========================
         GENERAL
    ========================== -->

    <div class="panel">

      <div class="search-message" id="message-general"></div>

      <div id="rechercher_generalement" class="search-bar">

        <input
          type="text"
          id="searchInput-general"
          spellcheck="true"
          placeholder="Chercher généralement"
          autocomplete="off"
        />

        <button id="searchButton-general">
          Chercher
        </button>

        <span class="counter" id="counter-general"></span>

      </div>

      <div id="general"></div>

    </div>

    <!-- =========================
         DEFINITIONS
    ========================== -->

    <div class="panel">

      <div class="search-message" id="message-definitions"></div>

      <div id="rechercher_definition" class="search-bar">

        <input
          type="text"
          id="searchInput-definitions"
          spellcheck="true"
          placeholder="Chercher une définition"
          autocomplete="off"
        />

        <button id="searchButton-definitions">
          Chercher
        </button>

        <span class="counter" id="counter-definitions"></span>

      </div>

      <div id="definitions"></div>

    </div>

    <!-- =========================
         CODE
    ========================== -->

    <div class="panel">

      <div class="search-message" id="message-code"></div>

      <div id="rechercher_exemple" class="search-bar">

        <input
          type="text"
          id="searchInput-code"
          spellcheck="true"
          placeholder="Chercher un exemple"
          autocomplete="off"
        />

        <button id="searchButton-code">
          Chercher
        </button>

        <span class="counter" id="counter-code"></span>

      </div>

      <div id="code"></div>

    </div>

  </div>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script>

    // =========================
    // CHARGEMENT GENERAL.HTML
    // =========================

    document.addEventListener("DOMContentLoaded", async () => {

      try {

        const response = await fetch("general.html");

        if (!response.ok) {
          throw new Error("Fichier introuvable ou erreur de chargement.");
        }

        const htmlContent = await response.text();

        document.getElementById("general").innerHTML = htmlContent;

      } catch (error) {

        console.error("Erreur :", error);

        document.getElementById("general").innerHTML =
          `<p style="color:red;">Erreur : ${error.message}</p>`;
      }
    });

    // =========================
    // CHARGEMENT DEFINITIONS
    // =========================

    document.addEventListener("DOMContentLoaded", async () => {

      try {

        const response = await fetch("definitions.html");

        if (!response.ok) {
          throw new Error("Fichier introuvable ou erreur de chargement.");
        }

        const htmlContent = await response.text();

        document.getElementById("definitions").innerHTML = htmlContent;

      } catch (error) {

        console.error("Erreur :", error);

        document.getElementById("definitions").innerHTML =
          `<p style="color:red;">Erreur : ${error.message}</p>`;
      }
    });

    // =========================
    // CHARGEMENT CODE.HTML
    // =========================

    document.addEventListener("DOMContentLoaded", async () => {

      try {

        const response = await fetch("code.html");

        if (!response.ok) {
          throw new Error("Fichier introuvable ou erreur de chargement.");
        }

        const htmlContent = await response.text();

        document.getElementById("code").innerHTML = htmlContent;

      } catch (error) {

        console.error("Erreur :", error);

        document.getElementById("code").innerHTML =
          `<p style="color:red;">Erreur : ${error.message}</p>`;
      }
    });

  </script>

  <script src="search.js"></script>

  <script>

    // =========================
    // VOIR AUSSI
    // =========================

    function voirAussi(classe) {
      const elements = document.getElementsByClassName(classe);

      if (elements.length === 0) {
          return;
      }

      const afficher = elements[0].style.display === "none";

      for (let i = 0; i < elements.length; i++) {
          elements[i].style.display = afficher ? "inline" : "none";
      }
    }

    // =========================
    // COLORATION CODE
    // =========================

    const codeDiv = document.getElementById("code");

    let content = codeDiv.textContent;

    // Échapper HTML

    content = content
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    // Coloration

    content = content.replace(

      /(#.*$)|([.\s])([a-zA-Z_-]+)(?=\()|\(([^()\n]*)\)|\[([^[\]\n]*)\]|\{([^{}\n]*)\}/gm,

      (match, comment, prefix, func, p1, p2, p3) => {

        // commentaires

        if (comment) {

          return `
            <span style="color: purple;">
              ${comment}
            </span>
          `;
        }

        return match;
      }
    );

    codeDiv.innerHTML = content;

  </script>

</body>

</html>
