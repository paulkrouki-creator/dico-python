{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>dico–python</title>

  <link
    rel="stylesheet"
    href="{% static 'css/style.css' %}"
  >

</head>

<body>

  <!-- =========================
       OPTIONS
  ========================== -->

  <div class="options">

    <label id="whole-word_only">

      <input
        type="checkbox"
        id="whole-word-only"
      >

      Mots entiers uniquement

    </label>

    <label id="respecter">

      <input
        type="checkbox"
        id="respect-accents"
      >

      Respecter accents et diacritiques

    </label>

  </div>

  <!-- =========================
       LAYOUT PRINCIPAL
  ========================== -->

  <div class="layout">

    <!-- =========================
         GENERAL
    ========================== -->

    <div class="panel">

      <div
        class="search-message"
        id="message-general"
      ></div>

      <div
        id="rechercher_generalement"
        class="search-bar"
      >

        <input
          type="text"
          id="searchInput-general"
          spellcheck="true"
          placeholder="Chercher généralement"
          autocomplete="off"
        >

        <button id="searchButton-general">
          Chercher
        </button>

        <span
          class="counter"
          id="counter-general"
        ></span>

      </div>

      <div
        id="general"
        class="content-panel"
      >

        {% include "general.html" %}

      </div>

    </div>

    <!-- =========================
         DEFINITIONS
    ========================== -->

    <div class="panel">

      <div
        class="search-message"
        id="message-definitions"
      ></div>

      <div
        id="rechercher_definition"
        class="search-bar"
      >

        <input
          type="text"
          id="searchInput-definitions"
          spellcheck="true"
          placeholder="Chercher une définition"
          autocomplete="off"
        >

        <button id="searchButton-definitions">
          Chercher
        </button>

        <span
          class="counter"
          id="counter-definitions"
        ></span>

      </div>

      <div
        id="definitions"
        class="content-panel"
      >

        {% include "definitions.html" %}

      </div>

    </div>

    <!-- =========================
         CODE
    ========================== -->

    <div class="panel">

      <div
        class="search-message"
        id="message-code"
      ></div>

      <div
        id="rechercher_exemple"
        class="search-bar"
      >

        <input
          type="text"
          id="searchInput-code"
          spellcheck="true"
          placeholder="Chercher un exemple"
          autocomplete="off"
        >

        <button id="searchButton-code">
          Chercher
        </button>

        <span
          class="counter"
          id="counter-code"
        ></span>

      </div>

      <div
        id="code"
        class="content-panel code-panel"
      >

        {% include "code.html" %}

      </div>

    </div>

  </div>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script src="{% static 'js/search.js' %}"></script>

  <script>

    // =========================
    // VOIR AUSSI
    // =========================

    function voirAussi(classe) {
      const elements = document.getElementsByClassName(classe);

      if (elements.length === 0) {
          return;
      }

      const afficher = elements[0].style.display === "none";

      for (let i = 0; i < elements.length; i++) {
          elements[i].style.display = afficher ? "inline" : "none";
      }
    }

// =========================
// COLORATION PYTHON
// =========================

function escapeHtml(text) {

  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function colorerLigne(line) {

  // Echappe HTML
  line = escapeHtml(line);

  // =========================
  // TRACEBACK
  // =========================

  if (/^Traceback/.test(line)) {
    return `<span class="py-error">${line}</span>`;
  }

  // =========================
  // FILE
  // =========================

  if (/^ *File ".*", line \d+/.test(line)) {
    return `<span class="py-error">${line}</span>`;
  }

  // =========================
  // ERREURS PYTHON
  // =========================

  if (/^([A-Za-z]+Error|[A-Za-z]+Exception):/.test(line)) {
    return `<span class="py-error">${line}</span>`;
  }

  // =========================
  // COMMENTAIRES
  // =========================

  line = line.replace(
    /#.*$/g,
    '<span class="py-comment">$&</span>'
  );

  // =========================
  // POINTS DE SUSPENSION
  // =========================

  line = line.replace(
    /\.\.\./g,
    '<span class="py-dots">...</span>'
  );

  // =========================
  // PROMPT PYTHON
  // =========================

  line = line.replace(
    /^&gt;&gt;&gt;/,
    '<span class="py-prompt">&gt;&gt;&gt;</span>'
  );

  return line;
}

function colorerPython() {

  const codeDiv = document.getElementById("code");

  if (!codeDiv) return;

  const lignes = codeDiv.textContent.split("\n");

  const resultat = lignes.map(
    colorerLigne
  );

  codeDiv.innerHTML = resultat.join("\n");
}

// =========================
// DOM READY
// =========================

document.addEventListener(
  "DOMContentLoaded",
  colorerPython
);

  </script>

</body>

</html>
