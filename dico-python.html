    <script>
// Exécuter la requête dès que la page est chargée
document.addEventListener("DOMContentLoaded", async () => {
	try {
        // Remplace "general.html" par le chemin vers ton fichier
        const response = await fetch("general.html");
        if (!response.ok) {
            throw new Error("Fichier introuvable ou erreur de chargement.");
        }
        const htmlContent = await response.text();
        document.getElementById("general").innerHTML = htmlContent;
    } catch (error) {
        console.error("Erreur :", error);
        document.getElementById("general").innerHTML =`<p style="color: red;">Erreur : ${error.message}</p>`;
    }
});

    <script type="text/javascript">
function voirAussi(element) {
  // Récupère tous les éléments ayant la même classe que le paramètre
  const elements = document.getElementsByClassName(element);

  // Parcourt chaque élément et applique display = 'block'
  for (let i = 0; i < elements.length; i++) {
    elements[i].style.display = 'inline';
  }
}
